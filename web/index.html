<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="DuckHive - runs anywhere, uses anything. open source, model-neutral, terminal-first." />
    <meta name="theme-color" content="#fafaf7" />
    <meta name="color-scheme" content="light dark" />
    <meta property="og:title" content="DuckHive - runs anywhere, uses anything" />
    <meta
      property="og:description"
      content="DuckHive is an open coding harness that runs in your terminal, talks to any model, and keeps every change reviewable."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DuckHive" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DuckHive - runs anywhere, uses anything" />
    <meta
      name="twitter:description"
      content="DuckHive brings open coding agents to your terminal on any model."
    />
    <title>DuckHive - runs anywhere, uses anything</title>
    <link rel="icon" type="image/png" href="/openclaude.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&display=swap"
    />
    <script>
      // Theme bootstrap - runs before paint to prevent flash.
      // Default is light; user toggle is honored via localStorage.
      (function () {
        try {
          var stored = localStorage.getItem('duckhive-theme');
          var theme = stored === 'dark' || stored === 'light' ? stored : 'light';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (_) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
